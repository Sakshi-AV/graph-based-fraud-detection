<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Dashboard - Graph Fraud Detection</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body data-page="user-dashboard">
  <header class="topbar">
    <a class="brand" href="/">
      <span class="brand-mark">GF</span>
      <span>
        <strong>Graph Fraud Detection</strong>
        <small>User dashboard</small>
      </span>
    </a>
    <nav class="nav-links" aria-label="Primary navigation">
      <a href="/">Monitor</a>
      <a href="/user-dashboard" aria-current="page">User Dashboard</a>
      <button class="nav-button" id="userLogoutButton" type="button">Logout</button>
    </nav>
  </header>

  <main class="app-shell">
    <section class="hero-panel">
      <div>
        <p class="eyebrow">Personal account</p>
        <h1 id="userDashboardTitle">User dashboard</h1>
        <p class="hero-copy" id="userAccountText">Loading account profile...</p>
      </div>
      <div class="status-strip" aria-label="User metrics">
        <div>
          <span>Total transactions</span>
          <strong id="userTotalTransactions">0</strong>
        </div>
        <div>
          <span>Fraud flags</span>
          <strong id="userFlaggedTransactions">0</strong>
        </div>
        <div>
          <span>Personal risk</span>
          <strong id="userPersonalRisk">0%</strong>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-heading">
        <div>
          <p class="eyebrow">Your transaction history</p>
          <h2>Submitted transactions</h2>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Time</th>
              <th>Receiver</th>
              <th>Type</th>
              <th>Amount</th>
              <th>Prediction</th>
              <th>Probability</th>
            </tr>
          </thead>
          <tbody id="userTransactionsTable"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="/static/js/app.js"></script>
</body>
</html>

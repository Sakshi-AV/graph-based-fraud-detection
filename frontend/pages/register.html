<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Graph Fraud Detection</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body data-page="register">
  <main class="admin-auth-shell">
    <form class="panel login-panel" id="registerForm">
      <a class="brand login-brand" href="/">
        <span class="brand-mark">GF</span>
        <span>
          <strong>Graph Fraud Detection</strong>
          <small>New user</small>
        </span>
      </a>

      <div>
        <p class="eyebrow">Create profile</p>
        <h1>Register</h1>
        <p class="hero-copy">A PaySim-style account ID will be generated automatically.</p>
      </div>

      <label>
        Username
        <input id="registerUsername" name="username" type="text" autocomplete="username" required>
      </label>
      <label>
        Password
        <input id="registerPassword" name="password" type="password" autocomplete="new-password" required>
      </label>

      <button class="primary-action" type="submit">Create account</button>
      <p class="form-message" id="registerMessage" aria-live="polite"></p>
      <a class="text-link" href="/login">Already have an account?</a>
    </form>
  </main>
  <script type="module" src="/static/js/app.js"></script>
</body>
</html>

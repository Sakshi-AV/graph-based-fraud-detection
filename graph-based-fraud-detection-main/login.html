<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Login - Graph Fraud Detection</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="login">
  <main class="admin-auth-shell">
    <form class="panel login-panel" id="userLoginForm">
      <a class="brand login-brand" href="index.html">
        <span class="brand-mark">GF</span>
        <span>
          <strong>Graph Fraud Detection</strong>
          <small>User access</small>
        </span>
      </a>

      <div>
        <p class="eyebrow">User session</p>
        <h1>Log in</h1>
        <p class="hero-copy">Use your account ID-backed profile to submit and track transactions.</p>
      </div>

      <label>
        Username
        <input id="loginUsername" name="username" type="text" autocomplete="username" required>
      </label>
      <label>
        Password
        <input id="loginPassword" name="password" type="password" autocomplete="current-password" required>
      </label>

      <button class="primary-action" type="submit">Log in</button>
      <p class="form-message" id="userLoginMessage" aria-live="polite"></p>
      <a class="text-link" href="register">Create an account</a>
    </form>
  </main>
  <script src="script.js"></script>
</body>
</html>
